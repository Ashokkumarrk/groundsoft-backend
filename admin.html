<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ground Soft — Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #070708;
        --ink-soft: #0e0e11;
        --panel: #131318;
        --panel-2: #191920;
        --panel-3: #22222b;
        --border: #2a2a34;
        --white: #f7f6fa;
        --grey: #a8a6b3;
        --grey-dim: #6f6d7a;
        --accent: #2f9eff;
        --accent-dim: #1c7ad9;
        --good: #3ddc84;
        --font-display: "Sora", sans-serif;
        --font-body: "Poppins", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--ink);
        color: var(--white);
        font-family: var(--font-body);
        font-size: 14px;
        line-height: 1.5;
      }
      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 36px 24px 80px;
      }
      header.top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
        flex-wrap: wrap;
        gap: 14px;
      }
      header.top h1 {
        font-family: var(--font-display);
        font-size: 24px;
        font-weight: 700;
        margin: 0;
      }
      header.top p {
        color: var(--grey);
        margin: 4px 0 0;
        font-size: 13px;
      }
      .refresh-btn {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--white);
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: 0.2s ease;
      }
      .refresh-btn:hover {
        background: var(--panel-3);
        border-color: var(--accent);
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 20px;
      }
      .stat-card .num {
        font-family: var(--font-display);
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
      }
      .stat-card .label {
        color: var(--grey);
        font-size: 12.5px;
        margin-top: 2px;
      }
      .tabs {
        display: flex;
        gap: 6px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 20px;
      }
      .tab-btn {
        background: transparent;
        border: none;
        color: var(--grey);
        padding: 12px 18px;
        font-size: 14px;
        font-weight: 600;
        font-family: var(--font-body);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .tab-btn.active {
        color: var(--white);
        border-bottom-color: var(--accent);
      }
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }
      .table-wrap {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }
      th {
        text-align: left;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--grey-dim);
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: var(--panel-2);
      }
      .msg-cell {
        max-width: 320px;
        white-space: pre-wrap;
        color: var(--grey);
      }
      .pill {
        display: inline-block;
        background: var(--panel-3);
        color: var(--grey);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 12px;
        white-space: nowrap;
      }
      .download-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 7px 14px;
        font-size: 12.5px;
        font-weight: 600;
        text-decoration: none;
        white-space: nowrap;
      }
      .download-btn:hover {
        background: var(--accent-dim);
      }
      .no-resume {
        color: var(--grey-dim);
        font-size: 12.5px;
      }
      .empty-state {
        padding: 60px 20px;
        text-align: center;
        color: var(--grey);
      }
      .empty-state .icon {
        font-size: 32px;
        display: block;
        margin-bottom: 10px;
      }
      .loading-state {
        padding: 60px 20px;
        text-align: center;
        color: var(--grey);
      }
      .timestamp {
        color: var(--grey-dim);
        font-size: 12.5px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <div>
          <h1>Ground Soft — Admin Dashboard</h1>
          <p>Contact leads and job applications, straight from the database.</p>
        </div>
        <button class="refresh-btn" id="refreshBtn">⟳ Refresh</button>
      </header>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="num" id="statContacts">—</div>
          <div class="label">Contact form leads</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statApplications">—</div>
          <div class="label">Job applications</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statResumes">—</div>
          <div class="label">Resumes on file</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="contacts">Leads</button>
        <button class="tab-btn" data-tab="applications">Applications</button>
      </div>

      <div class="panel active" id="panel-contacts">
        <div class="table-wrap" id="contactsTableWrap">
          <div class="loading-state">Loading leads…</div>
        </div>
      </div>

      <div class="panel" id="panel-applications">
        <div class="table-wrap" id="applicationsTableWrap">
          <div class="loading-state">Loading applications…</div>
        </div>
      </div>
    </div>

    <script>
      function escapeHTML(str) {
        if (str === null || str === undefined) return "";
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatDate(iso) {
        if (!iso) return "-";
        const d = new Date(iso);
        return d.toLocaleString(undefined, {
          day: "2-digit",
          month: "short",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      async function loadContacts() {
        const wrap = document.getElementById("contactsTableWrap");
        wrap.innerHTML = '<div class="loading-state">Loading leads…</div>';
        try {
          const res = await fetch("/admin/contacts");
          const rows = await res.json();
          document.getElementById("statContacts").textContent = rows.length;

          if (rows.length === 0) {
            wrap.innerHTML =
              '<div class="empty-state"><span class="icon">📭</span>No leads yet. They\'ll show up here the moment someone submits the contact form.</div>';
            return;
          }

          let html =
            "<table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Service</th><th>Message</th><th>Received</th></tr></thead><tbody>";
          for (const r of rows) {
            html += `<tr>
              <td>${escapeHTML(r.name)}</td>
              <td>${escapeHTML(r.phone) || "-"}</td>
              <td>${escapeHTML(r.email)}</td>
              <td><span class="pill">${escapeHTML(r.service) || "-"}</span></td>
              <td class="msg-cell">${escapeHTML(r.message)}</td>
              <td class="timestamp">${formatDate(r.created_at)}</td>
            </tr>`;
          }
          html += "</tbody></table>";
          wrap.innerHTML = html;
        } catch (err) {
          wrap.innerHTML =
            '<div class="empty-state"><span class="icon">⚠️</span>Could not load leads. Try refreshing.</div>';
          console.error(err);
        }
      }

      async function loadApplications() {
        const wrap = document.getElementById("applicationsTableWrap");
        wrap.innerHTML =
          '<div class="loading-state">Loading applications…</div>';
        try {
          const res = await fetch("/admin/applications");
          const rows = await res.json();
          document.getElementById("statApplications").textContent = rows.length;
          document.getElementById("statResumes").textContent = rows.filter(
            (r) => r.resume_file,
          ).length;

          if (rows.length === 0) {
            wrap.innerHTML =
              '<div class="empty-state"><span class="icon">📭</span>No applications yet. They\'ll show up here the moment someone applies.</div>';
            return;
          }

          let html =
            "<table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Resume</th><th>Applied</th></tr></thead><tbody>";
          for (const r of rows) {
            const resumeCell = r.resume_file
              ? `<a class="download-btn" href="/admin/resume/${encodeURIComponent(r.resume_file)}" target="_blank" rel="noopener">⬇ Download</a>`
              : '<span class="no-resume">No file</span>';
            html += `<tr>
              <td>${escapeHTML(r.fullname)}</td>
              <td>${escapeHTML(r.email)}</td>
              <td>${escapeHTML(r.phone) || "-"}</td>
              <td><span class="pill">${escapeHTML(r.role) || "-"}</span></td>
              <td>${resumeCell}</td>
              <td class="timestamp">${formatDate(r.created_at)}</td>
            </tr>`;
          }
          html += "</tbody></table>";
          wrap.innerHTML = html;
        } catch (err) {
          wrap.innerHTML =
            '<div class="empty-state"><span class="icon">⚠️</span>Could not load applications. Try refreshing.</div>';
          console.error(err);
        }
      }

      function loadAll() {
        loadContacts();
        loadApplications();
      }

      document.getElementById("refreshBtn").addEventListener("click", loadAll);

      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".tab-btn")
            .forEach((b) => b.classList.remove("active"));
          document
            .querySelectorAll(".panel")
            .forEach((p) => p.classList.remove("active"));
          btn.classList.add("active");
          document
            .getElementById("panel-" + btn.dataset.tab)
            .classList.add("active");
        });
      });

      loadAll();
    </script>
  </body>
</html>
